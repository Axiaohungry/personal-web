name: Deploy ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ecs-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64
      - ecs-personal-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to local ECS runtime
        shell: bash
        env:
          MODE: ${{ vars.ECS_DEPLOY_MODE || 'proxy' }}
          FITNESS_API_UPSTREAM_BASE_URL: ${{ secrets.FITNESS_API_UPSTREAM_BASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: |
          bash ./scripts/ecs/deploy.sh
